    <body>
        <h1>IT CONSULTANT APPLICATION FORM</h1>
        <P><i>Please make sure you fill out the form below*</i></P>

        <!--  HTML Forms are used to collect user data and store the same data inside of a Database.  -->
          <form>
            <!-- First partition starts here -->
             <fieldset>
                <legend>CONTACT DETAILS</legend>

                <input type="text" placeholder="Enter name" ><br><br>

                <input type="text" placeholder="Enter telephone number"><br><br>

                <input type="text" placeholder="Enter Email" ><br><br>

             </fieldset>
             <!-- first partition ends here -->
              <!-- second partition starts here -->

              <fieldset>
               <legend>PERSONAL DETAILS</legend>
                <input type="number" placeholder="Your Age" ><br><br>

                <label>Gender</label><br>
                <select>
                    <option value="0"> Choose Gender</option>
                    <option value="1">Male</option>
                    <option value="2">Female</option>
                </select><br><br>

                 <label> What gave you the motivation to apply</label><br>
                 <textarea cols="30" rows="10" ></textarea><br><br>
              </fieldset>
              <!-- second partition ends here -->
               <!-- third partition starts here -->

                <fieldset>
                    <label>PICK YOUR FAVOURITE LANGUAGE</label><br> 
                    JAVA <input type="checkbox" name="language">
                    HTML <input type="checkbox" name="language">
                    SQL <input type="checkbox" name="language">
                </fieldset> 
                 <!--third partition ends here  -->
                 
                 <input type="Submit">
          </form>
    </body>
